<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои расходы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<!-- НАВБАР (добавь в начало body каждого шаблона) -->
<!-- НАВБАР -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/expenses">💰 Мои расходы</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3">
                Привет, <strong th:text="${currentUser.firstName} + ' ' + ${currentUser.lastName}"></strong>!
            </span>

            <!-- ВЫХОД через форму (POST) -->
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>
<h1>Расходы</h1>

<div class="row">
    <div class="col-md-8">
        <a href="/expenses/add" class="btn btn-primary mb-3">+ Добавить расход</a>
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Дата</th>
                <th>Категория</th>
                <th>Описание</th>
                <th class="text-end">Сумма</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="exp : ${expenses}">
                <td th:text="${exp.date}"></td>
                <td th:text="${exp.category}"></td>
                <td th:text="${exp.description}"></td>
                <td class="text-end" th:text="${exp.amount} + ' BYN'"></td>
                <td>
                    <a th:href="@{/expenses/edit/{id}(id=${exp.id})}" class="btn btn-sm btn-warning">Изменить</a>
                    <a th:href="@{/expenses/delete/{id}(id=${exp.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">Удалить</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Статистика -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5>Итого потрачено: <span class="text-danger" th:text="${total} + ' BYN'"></span></h5>
                <h6>По категориям:</h6>
                <ul class="list-group" th:each="entry : ${byCategory}">
                    <li class="list-group-item d-flex justify-content-between">
                        <span th:text="${entry.key}"></span>
                        <span th:text="${entry.value} + ' BYN'"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

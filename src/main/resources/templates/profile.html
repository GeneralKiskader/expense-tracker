<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль • ExpenseTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); }
        .input-focus { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-focus:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .nav-active { background-color: #27272a; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- Top Navigation -->
    <nav class="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-x-8">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-wallet text-white text-2xl"></i>
                    </div>
                    <span class="font-semibold text-2xl tracking-tighter">Expense<span class="text-emerald-400">Tracker</span></span>
                </div>

                <div class="hidden md:flex items-center gap-x-1 text-sm">
                    <a th:href="@{/dashboard}" class="px-4 py-2 rounded-2xl hover:bg-zinc-900 transition-colors flex items-center gap-x-2">
                        <i class="fa-solid fa-chart-line w-4"></i>
                        <span>Дашборд</span>
                    </a>
                    <a th:href="@{/expenses}" class="px-4 py-2 rounded-2xl hover:bg-zinc-900 transition-colors flex items-center gap-x-2">
                        <i class="fa-solid fa-receipt w-4"></i>
                        <span>Расходы</span>
                    </a>
                    <a th:href="@{/profile}" class="nav-active px-4 py-2 rounded-2xl flex items-center gap-x-2">
                        <i class="fa-solid fa-user w-4"></i>
                        <span>Профиль</span>
                    </a>
                </div>
            </div>

            <div class="flex items-center gap-x-3">
                <div class="flex items-center gap-x-2 bg-zinc-900 rounded-3xl px-2 py-1.5 pr-5">
                    <img th:src="@{'https://i.pravatar.cc/32?u=' + ${currentUser.email}}" class="w-8 h-8 rounded-2xl" alt="avatar">
                    <div>
                        <div class="text-sm font-medium" th:text="${currentUser.firstName}">Иван</div>
                    </div>
                </div>
                <a th:href="@{/logout}" class="px-4 py-2 text-sm hover:bg-zinc-900 rounded-2xl flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-sign-out-alt"></i>
                </a>
            </div>
        </div>
    </nav>

    <div class="pt-20 max-w-4xl mx-auto px-6 pb-12">
        <div class="mb-8">
            <h1 class="text-4xl font-semibold tracking-tighter">Мой профиль</h1>
            <p class="text-zinc-400 mt-1">Управляйте своими данными и настройками аккаунта</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Profile Info Card -->
            <div class="lg:col-span-2 glass border border-zinc-800 rounded-3xl p-8">
                <div class="flex items-center gap-x-4 mb-8">
                    <img th:src="@{'https://i.pravatar.cc/80?u=' + ${currentUser.email}}" class="w-20 h-20 rounded-3xl border-4 border-zinc-700" alt="avatar">
                    <div>
                        <div class="text-2xl font-semibold" th:text="${currentUser.firstName + ' ' + currentUser.lastName}">Иван Иванов</div>
                        <div class="text-emerald-400 flex items-center gap-x-2">
                            <i class="fa-solid fa-check-circle"></i>
                            <span th:text="${currentUser.role}">USER</span>
                        </div>
                    </div>
                </div>

                <form th:action="@{/profile/update}" method="post" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Имя</label>
                            <input type="text" name="firstName" th:value="${currentUser.firstName}" required
                                   class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Фамилия</label>
                            <input type="text" name="lastName" th:value="${currentUser.lastName}" required
                                   class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Email</label>
                        <input type="email" name="email" th:value="${currentUser.email}" required
                               class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                    </div>

                    <div class="pt-4">
                        <button type="submit" 
                                class="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold flex items-center gap-x-2 transition-all">
                            <i class="fa-solid fa-save"></i>
                            <span>Сохранить изменения</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Change Password Card -->
            <div class="glass border border-zinc-800 rounded-3xl p-8">
                <div class="font-semibold text-xl mb-6 flex items-center gap-x-3">
                    <i class="fa-solid fa-key text-emerald-400"></i>
                    <span>Сменить пароль</span>
                </div>

                <form th:action="@{/profile/change-password}" method="post" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Текущий пароль</label>
                        <input type="password" name="currentPassword" required
                               class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Новый пароль</label>
                        <input type="password" name="newPassword" required minlength="6"
                               class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-1.5">Повторите новый пароль</label>
                        <input type="password" name="confirmPassword" required
                               class="input-focus w-full bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-2xl focus:outline-none">
                    </div>

                    <button type="submit" 
                            class="w-full mt-4 py-3 bg-white text-zinc-950 rounded-2xl font-semibold hover:bg-zinc-100 transition-all flex items-center justify-center gap-x-2">
                        <span>Обновить пароль</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Account Stats -->
        <div class="mt-8 glass border border-zinc-800 rounded-3xl p-8">
            <div class="font-semibold text-xl mb-6">Статистика аккаунта</div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div>
                    <div class="text-sm text-zinc-400">Дата регистрации</div>
                    <div class="text-2xl font-semibold mt-1" th:text="${registrationDate}">15 янв 2026</div>
                </div>
                <div>
                    <div class="text-sm text-zinc-400">Всего расходов</div>
                    <div class="text-2xl font-semibold mt-1" th:text="${expenseCount}">87</div>
                </div>
                <div>
                    <div class="text-sm text-zinc-400">Общая сумма</div>
                    <div class="text-2xl font-semibold mt-1" th:text="${#numbers.formatDecimal(totalAmount != null ? totalAmount : 0, 0, 'COMMA', 0, 'POINT')} + ' BYN'">124 580 BYN</div>
                </div>
                <div>
                    <div class="text-sm text-zinc-400">Активность</div>
                    <div class="flex items-center gap-x-2 mt-1">
                        <div class="px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-2xl text-sm">Высокая</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

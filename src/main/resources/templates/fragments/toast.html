<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<div th:fragment="toast">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-3"></div>

    <script th:inline="javascript">
        // Получаем переменные из Spring Controller
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;
        const infoMsg = /*[[${info}]]*/ null;
        const shouldCelebrate = /*[[${celebrate}]]*/ false;

        document.addEventListener('DOMContentLoaded', () => {
            // Если прилетел флаг салюта — запускаем конфетти!
            if (shouldCelebrate) {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#10b981', '#34d399', '#ffffff'] // Изумрудные и белые цвета
                });
            }

            // Показываем уведомления, если они есть
            if (successMsg) showToast(successMsg, 'success');
            if (errorMsg) showToast(errorMsg, 'error');
            if (infoMsg) showToast(infoMsg, 'info');
        });

        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');

            let bgColor = 'bg-emerald-600';
            let icon = 'fa-check-circle';

            if (type === 'error') {
                bgColor = 'bg-red-600';
                icon = 'fa-exclamation-circle';
            } else if (type === 'warning') {
                bgColor = 'bg-amber-500';
                icon = 'fa-exclamation-triangle';
            } else if (type === 'info') {
                bgColor = 'bg-blue-600';
                icon = 'fa-info-circle';
            }

            // Добавлен класс animate-bounce-short для красивого подпрыгивания
            toast.className = `flex items-center gap-x-3 ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl max-w-sm transform transition-all duration-300 opacity-0 translate-y-4 animate-bounce-short`;

            toast.innerHTML = `
                <div class="flex-shrink-0">
                    <i class="fa-solid ${icon} text-xl"></i>
                </div>
                <div class="flex-1 text-sm font-medium">${message}</div>
                <button onclick="this.parentElement.remove()" class="ml-4 text-white/70 hover:text-white transition-colors">
                    <i class="fa-solid fa-times"></i>
                </button>
            `;

            container.appendChild(toast);

            // Анимация появления
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 10);

            // Удаление через время
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('opacity-0', 'translate-y-4');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    setTimeout(() => toast.remove(), 300);
                }
            }, duration);
        }
    </script>

    <style>
        /* Красивая анимация подпрыгивания при появлении тоста */
        @keyframes bounce-short {
            0% { transform: translateY(20px); opacity: 0; }
            50% { transform: translateY(-5px); opacity: 1; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-bounce-short {
            animation: bounce-short 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</div>
</body>
</html>

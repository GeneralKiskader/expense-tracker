<!-- Toast Notification Fragment -->
<div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-3"></div>

<script>
    function showToast(message, type = 'success', duration = 4000) {
        const container = document.getElementById('toast-container');
        if (!container) return;

        const toast = document.createElement('div');
        
        let bgColor = 'bg-emerald-600';
        let icon = 'fa-check-circle';
        
        if (type === 'error') {
            bgColor = 'bg-red-600';
            icon = 'fa-exclamation-circle';
        } else if (type === 'warning') {
            bgColor = 'bg-amber-500';
            icon = 'fa-exclamation-triangle';
        } else if (type === 'info') {
            bgColor = 'bg-blue-600';
            icon = 'fa-info-circle';
        }

        toast.className = `flex items-center gap-x-3 ${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl max-w-sm transform transition-all duration-300 opacity-0 translate-y-4`;
        
        toast.innerHTML = `
            <div class="flex-shrink-0">
                <i class="fa-solid ${icon} text-xl"></i>
            </div>
            <div class="flex-1 text-sm font-medium">${message}</div>
            <button onclick="this.parentElement.remove()" class="ml-4 text-white/70 hover:text-white">
                <i class="fa-solid fa-times"></i>
            </button>
        `;

        container.appendChild(toast);

        // Animate in
        setTimeout(() => {
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
        }, 10);

        // Auto remove
        setTimeout(() => {
            if (toast.parentElement) {
                toast.classList.add('opacity-0', 'translate-y-4');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }

    // Example: showToast('Расход успешно добавлен!', 'success');
</script>

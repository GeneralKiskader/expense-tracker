<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="text-center">Вход в систему расходов</h2>

<div th:if="${param.error}" class="alert alert-danger">Неверный email или пароль</div>
<div th:if="${param.success}" class="alert alert-success">Регистрация прошла успешно! Войдите.</div>

<form th:action="@{/login}" method="post" class="col-md-6 mx-auto">
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Войти</button>
</form>

<div class="text-center mt-3">
    <a href="/register">Нет аккаунта? Зарегистрироваться</a>
</div>
</body>
</html>

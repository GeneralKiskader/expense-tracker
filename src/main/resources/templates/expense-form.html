<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый расход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<!-- НАВБАР -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/expenses">💰 Мои расходы</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3">
                Привет, <strong th:text="${currentUser.firstName} + ' ' + ${currentUser.lastName}"></strong>!
            </span>

            <!-- ВЫХОД через форму (POST) -->
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>
<h1 th:text="${expense.id == null} ? 'Добавить расход' : 'Редактировать расход'">Новый расход</h1>

<form th:action="@{/expenses}" th:object="${expense}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">Дата</label>
        <input type="date" class="form-control" th:field="*{date}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Категория</label>
        <input type="text" class="form-control" th:field="*{category}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Описание</label>
        <input type="text" class="form-control" th:field="*{description}">
    </div>

    <div class="mb-3">
        <label class="form-label">Сумма (BYN)</label>
        <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
    </div>

    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="/expenses" class="btn btn-secondary">Отмена</a>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

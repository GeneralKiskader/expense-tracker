<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ошибка • ExpenseTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 flex items-center justify-center min-h-screen">
<div class="text-center">
    <div class="text-6xl mb-4">⚠️</div>
    <h1 class="text-3xl font-semibold mb-4">Упс, что-то пошло не так</h1>
    <p class="text-zinc-400 mb-8" th:text="${errorMessage}">Непредвиденная ошибка</p>
    <a th:href="@{/dashboard}" class="px-6 py-3 bg-emerald-600 rounded-2xl font-semibold">Вернуться на главную</a>
</div>
</body>
</html>
